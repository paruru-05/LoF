<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名簿集計</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 互換性と本番環境での動作を最優先したFirebase互換（compat）SDKの読み込み -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        /* タッチターゲット用の非表示ヒットボックススタイル */
        .corner-trigger {
            position: fixed;
            width: 96px;
            height: 96px;
            z-index: 9999;
            cursor: default;
            user-select: none;
            background-color: transparent;
            -webkit-tap-highlight-color: transparent;
        }
        #trigger-tr { top: 0; right: 0; }
        #trigger-br { bottom: 0; right: 0; }
        #trigger-bl { bottom: 0; left: 0; }
        #trigger-tl { top: 0; left: 0; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col justify-center items-center font-sans relative overflow-x-hidden">

    <!-- 隠しリセット用の四隅のヒットボックス (右上 -> 右下 -> 左下 -> 左上) -->
    <div id="trigger-tr" class="corner-trigger"></div>
    <div id="trigger-br" class="corner-trigger"></div>
    <div id="trigger-bl" class="corner-trigger"></div>
    <div id="trigger-tl" class="corner-trigger"></div>

    <!-- 1. お名前入力スクリーン -->
    <div id="name-screen" class="w-full max-w-md px-6 py-12 text-center transition-all duration-500 transform scale-100">
        <h1 class="text-2xl font-light tracking-widest text-gray-950 mb-8">お名前は？</h1>
        <div class="space-y-4">
            <input type="text" id="username-input" placeholder="なまえを入力してください" 
                class="w-full px-4 py-3 border-b-2 border-gray-200 focus:border-gray-900 bg-transparent text-center text-lg outline-none transition-all duration-300 tracking-wider">
            <button id="submit-name-btn" 
                class="w-full py-3 bg-gray-900 hover:bg-gray-800 text-white font-medium rounded-lg text-sm tracking-widest transition duration-300">
                確定する
            </button>
        </div>
    </div>

    <!-- 2. メイン表示スクリーン -->
    <div id="main-screen" class="hidden w-full max-w-3xl px-6 py-12 transition-all duration-500 opacity-0 transform translate-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            <!-- Love 表 -->
            <div>
                <div class="flex justify-between items-baseline border-b border-gray-200 pb-3 mb-6">
                    <h2 class="text-xl font-light tracking-widest text-red-600">Love</h2>
                    <span id="count-love" class="text-xs text-gray-400 font-mono">0 件</span>
                </div>
                <ul id="list-love" class="space-y-3 text-sm text-gray-600 tracking-wide">
                    <!-- 動的に名前が入ります -->
                </ul>
            </div>

            <!-- Friendship 表 -->
            <div>
                <div class="flex justify-between items-baseline border-b border-gray-200 pb-3 mb-6">
                    <h2 class="text-xl font-light tracking-widest text-blue-600">Friendship</h2>
                    <span id="count-friend" class="text-xs text-gray-400 font-mono">0 件</span>
                </div>
                <ul id="list-friend" class="space-y-3 text-sm text-gray-600 tracking-wide">
                    <!-- 動的に名前が入ります -->
                </ul>
            </div>
        </div>
    </div>

    <!-- パスコード入力モーダル -->
    <div id="password-modal" class="hidden fixed inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center p-4 z-[9999]">
        <div class="bg-white border border-gray-100 rounded-2xl max-w-xs w-full p-6 text-center shadow-2xl">
            <h3 class="text-sm font-semibold text-gray-900 tracking-wider mb-4">認証が必要です</h3>
            <p class="text-xs text-gray-400 mb-4">パスコードを入力してください。</p>
            <input type="password" id="passcode-input" maxlength="4" placeholder="••••" 
                class="w-full px-4 py-2 text-center text-xl tracking-widest border border-gray-200 rounded-lg outline-none focus:border-gray-900 mb-4 font-mono">
            <div id="passcode-error" class="hidden text-xs text-red-500 mb-4">パスコードが違います</div>
            <div class="flex space-x-2">
                <button id="cancel-passcode-btn" class="flex-1 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-semibold rounded-lg transition">
                    キャンセル
                </button>
                <button id="confirm-passcode-btn" class="flex-1 py-2 bg-gray-900 hover:bg-gray-800 text-white text-xs font-semibold rounded-lg transition">
                    確認
                </button>
            </div>
        </div>
    </div>

    <!-- リセット成功時のポップアップ -->
    <div id="reset-success-modal" class="hidden fixed inset-0 bg-black/10 backdrop-blur-sm flex items-center justify-center p-4 z-[10000]">
        <div class="bg-white border border-gray-100 rounded-2xl max-w-xs w-full p-6 text-center shadow-xl transform scale-95 transition-all">
            <div class="w-12 h-12 rounded-full bg-gray-50 text-gray-900 flex items-center justify-center mx-auto mb-3 text-lg border border-gray-100">
                ✓
            </div>
            <h3 class="text-sm font-semibold text-gray-900 tracking-wider">リセット完了</h3>
            <p class="text-xs text-gray-400 mt-1">すべてのデータが消去されました。</p>
        </div>
    </div>

    <!-- アプリケーションスクリプト -->
    <script>
        // DOMが読み込まれてから初期化
        window.addEventListener('DOMContentLoaded', () => {
            // Firebase 構成
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'minimal-visitor-app';
            const rawFirebaseConfig = typeof __firebase_config !== 'undefined' ? __firebase_config : null;

            const fallbackConfig = {
                apiKey: "", 
                authDomain: "mock-project.firebaseapp.com",
                projectId: "mock-project",
                storageBucket: "mock-project.appspot.com",
                messagingSenderId: "1234567890",
                appId: "1:1234567890:web:abcdef"
            };

            const firebaseConfig = rawFirebaseConfig ? JSON.parse(rawFirebaseConfig) : fallbackConfig;

            let db, collectionRef;
            let currentUser = null;
            let isFirebaseOnline = false;
            let listData = [];

            // URLパラメータのチェック (?l か ?f か)
            const urlParams = new URLSearchParams(window.location.search);
            let currentType = null;
            if (urlParams.has('l') || window.location.search === '?l') {
                currentType = 'love';
            } else if (urlParams.has('f') || window.location.search === '?f') {
                currentType = 'friendship';
            }

            // Firebase接続のセットアップ
            const initFirebase = async () => {
                // CDNがロードされるまで少し待機して確認
                if (typeof firebase === 'undefined') {
                    console.warn("Firebase SDK not loaded yet. Retrying in 100ms...");
                    setTimeout(initFirebase, 100);
                    return;
                }

                try {
                    // 互換モードの初期化
                    const app = firebase.initializeApp(firebaseConfig);
                    const auth = firebase.auth();
                    db = firebase.firestore();
                    // RULE 1に準拠したセキュアパス
                    collectionRef = db.collection('artifacts').doc(appId).collection('public').document ? null : db.collection('artifacts').doc(appId).collection('public').doc('data').collection('visitors');

                    // 匿名認証
                    auth.signInAnonymously().then((userCredential) => {
                        currentUser = userCredential.user;
                        isFirebaseOnline = true;
                        startDataListener();
                    }).catch((error) => {
                        console.warn("Auth failed, running in local mode:", error);
                        isFirebaseOnline = false;
                        loadLocalData();
                    });

                } catch (error) {
                    console.warn("Firebase setup failed. Running in offline/local simulator mode:", error);
                    isFirebaseOnline = false;
                    loadLocalData();
                }
            };

            // ローカルデータの取得
            function loadLocalData() {
                const cached = localStorage.getItem('local_visitors_data');
                listData = cached ? JSON.parse(cached) : [];
                renderLists();
            }

            // データのリアルタイム監視
            function startDataListener() {
                if (!collectionRef) return;
                collectionRef.onSnapshot((snapshot) => {
                    listData = [];
                    snapshot.forEach((doc) => {
                        listData.push({ id: doc.id, ...doc.data() });
                    });
                    
                    listData.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                    renderLists();
                }, (error) => {
                    console.warn("Snapshot error, falling back to local data:", error);
                    isFirebaseOnline = false;
                    loadLocalData();
                });
            }

            // 表示データのレンダリング
            function renderLists() {
                const listLoveEl = document.getElementById('list-love');
                const listFriendEl = document.getElementById('list-friend');
                const countLoveEl = document.getElementById('count-love');
                const countFriendEl = document.getElementById('count-friend');

                listLoveEl.innerHTML = '';
                listFriendEl.innerHTML = '';

                const loveItems = listData.filter(item => item.type === 'love');
                const friendItems = listData.filter(item => item.type === 'friendship');

                countLoveEl.textContent = `${loveItems.length} 件`;
                countFriendEl.textContent = `${friendItems.length} 件`;

                if (loveItems.length === 0) {
                    listLoveEl.innerHTML = '<li class="text-gray-300 font-light italic">まだありません</li>';
                } else {
                    loveItems.forEach(item => {
                        const li = document.createElement('li');
                        li.className = "py-1.5 border-b border-gray-100 flex justify-between items-center";
                        li.innerHTML = `<span class="font-medium text-gray-800">${escapeHtml(item.name)}</span><span class="text-[10px] text-gray-300 font-mono">${formatDate(item.timestamp)}</span>`;
                        listLoveEl.appendChild(li);
                    });
                }

                if (friendItems.length === 0) {
                    listFriendEl.innerHTML = '<li class="text-gray-300 font-light italic">まだありません</li>';
                } else {
                    friendItems.forEach(item => {
                        const li = document.createElement('li');
                        li.className = "py-1.5 border-b border-gray-100 flex justify-between items-center";
                        li.innerHTML = `<span class="font-medium text-gray-800">${escapeHtml(item.name)}</span><span class="text-[10px] text-gray-300 font-mono">${formatDate(item.timestamp)}</span>`;
                        listFriendEl.appendChild(li);
                    });
                }
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/&/g, '&amp;')
                          .replace(/</g, '&lt;')
                          .replace(/>/g, '&gt;')
                          .replace(/"/g, '&quot;')
                          .replace(/'/g, '&#039;');
            }

            function formatDate(timestamp) {
                if (!timestamp) return '';
                const date = new Date(timestamp);
                return `${date.getMonth() + 1}/${date.getDate()} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
            }

            // 名前入力の送信
            async function submitName() {
                const nameInput = document.getElementById('username-input');
                const name = nameInput.value.trim();

                if (!name) return;

                if (currentType) {
                    if (isFirebaseOnline && collectionRef) {
                        try {
                            await collectionRef.add({
                                name: name,
                                type: currentType,
                                timestamp: Date.now()
                            });
                        } catch (error) {
                            console.error("Firebase write error, saving locally:", error);
                            saveLocally(name, currentType);
                        }
                    } else {
                        saveLocally(name, currentType);
                    }
                }

                transitionToMain();
            }

            // ローカル一時保存
            function saveLocally(name, type) {
                const newItem = {
                    id: 'local_' + Date.now(),
                    name: name,
                    type: type,
                    timestamp: Date.now()
                };
                listData.unshift(newItem);
                localStorage.setItem('local_visitors_data', JSON.stringify(listData));
                renderLists();
            }

            function transitionToMain() {
                const nameScreen = document.getElementById('name-screen');
                const mainScreen = document.getElementById('main-screen');

                nameScreen.classList.add('opacity-0', 'scale-95');
                setTimeout(() => {
                    nameScreen.classList.add('hidden');
                    mainScreen.classList.remove('hidden');
                    setTimeout(() => {
                        mainScreen.classList.remove('opacity-0', 'translate-y-4');
                        mainScreen.classList.add('opacity-100', 'translate-y-0');
                    }, 50);
                }, 300);
            }

            // イベントリスナーの登録
            document.getElementById('submit-name-btn').addEventListener('click', submitName);
            document.getElementById('username-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    submitName();
                }
            });

            // 隠しリセットシーケンス (右上 -> 右下 -> 左下 -> 左上)
            const targetSequence = ['tr', 'br', 'bl', 'tl'];
            let currentSequence = [];

            const corners = {
                'tr': document.getElementById('trigger-tr'),
                'br': document.getElementById('trigger-br'),
                'bl': document.getElementById('trigger-bl'),
                'tl': document.getElementById('trigger-tl')
            };

            Object.keys(corners).forEach(key => {
                if (corners[key]) {
                    corners[key].addEventListener('click', () => {
                        handleCornerClick(key);
                    });
                }
            });

            function handleCornerClick(corner) {
                const expectedNextCorner = targetSequence[currentSequence.length];

                if (corner === expectedNextCorner) {
                    currentSequence.push(corner);
                    
                    if (currentSequence.length === targetSequence.length) {
                        currentSequence = []; 
                        openPasswordModal(); 
                    }
                } else {
                    if (corner === targetSequence[0]) {
                        currentSequence = [corner];
                    } else {
                        currentSequence = [];
                    }
                }
            }

            // パスコードモーダルの管理
            function openPasswordModal() {
                const modal = document.getElementById('password-modal');
                const input = document.getElementById('passcode-input');
                const error = document.getElementById('passcode-error');
                
                input.value = '';
                error.classList.add('hidden');
                modal.classList.remove('hidden');
                input.focus();
            }

            function closePasswordModal() {
                document.getElementById('password-modal').classList.add('hidden');
            }

            document.getElementById('cancel-passcode-btn').addEventListener('click', closePasswordModal);
            document.getElementById('confirm-passcode-btn').addEventListener('click', verifyPasscode);
            document.getElementById('passcode-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    verifyPasscode();
                }
            });

            function verifyPasscode() {
                const input = document.getElementById('passcode-input');
                const error = document.getElementById('passcode-error');

                if (input.value === '2543') {
                    closePasswordModal();
                    triggerDatabaseReset();
                } else {
                    error.classList.remove('hidden');
                    input.value = '';
                    input.focus();
                }
            }

            // データベースの完全消去
            async function triggerDatabaseReset() {
                localStorage.removeItem('local_visitors_data');
                listData = [];
                renderLists();

                if (isFirebaseOnline && collectionRef) {
                    try {
                        const querySnapshot = await collectionRef.get();
                        const batch = db.batch();
                        querySnapshot.forEach((docSnap) => {
                            batch.delete(docSnap.ref);
                        });
                        await batch.commit();
                    } catch (error) {
                        console.error("Firebase reset error:", error);
                    }
                }
                
                showResetSuccessPopup();
            }

            function showResetSuccessPopup() {
                const modal = document.getElementById('reset-success-modal');
                modal.classList.remove('hidden');
                
                setTimeout(() => {
                    modal.classList.add('hidden');
                    window.location.search = ""; 
                }, 2500);
            }

            // 起動
            initFirebase();
        });
    </script>
</body>
</html>
